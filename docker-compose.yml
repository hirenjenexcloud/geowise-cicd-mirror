services:
  app:
    build: .
    container_name: geotracker-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000" # your API port
      - "1883:1883" # expose MQTT broker port
    volumes:
      - ./:/usr/src/app:cached
      - node_modules:/usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/geotracker
      - MQTT_HOST=0.0.0.0 # Mosca will listen on all interfaces
      - SERVER_IP=127.0.0.1 # your host system IP (for devices)
    command: sh -c "npm install && npm run dev"
    depends_on:
      - mongo
    networks:
      - geotracker-net

  mongo:
    image: mongo:6.0
    container_name: geotracker-mongo
    restart: unless-stopped
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - geotracker-net

volumes:
  mongo-data:
  node_modules:

networks:
  geotracker-net:
    driver: bridge
