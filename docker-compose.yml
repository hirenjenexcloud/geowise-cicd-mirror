
services:
  app:
    container_name: geotracker-app
    build: .
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "4000:4000"
      - "1883:1883"

    volumes:
      - /opt/geotracker/uploads:/usr/src/app/Server/src/uploads
      - /opt/geotracker/logs:/usr/src/app/Server/src/logs

    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://host.docker.internal:27017/geotracker
      - MQTT_HOST=0.0.0.0
      - SERVER_IP=127.0.0.1

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - geotracker-net

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  geotracker-net:
    driver: bridge
