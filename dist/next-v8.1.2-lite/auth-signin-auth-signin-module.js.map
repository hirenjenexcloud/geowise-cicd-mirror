module.exports = "<div class=\"auth-wrapper\">\r\n  <div class=\"auth-content\">\r\n    <div class=\"card\">\r\n      <div class=\"row align-items-center text-center\">\r\n        <div class=\"col-md-12\">\r\n          <div class=\"card-body\">\r\n            <form [formGroup]=\"loginForm\" (ngSubmit) =\"login()\">\r\n            <img src=\"assets/images/logo-dark.png\" alt=\"\" class=\"img-fluid mb-4\">\r\n            <h4 class=\"mb-3 f-w-400\">Signin</h4>\r\n            <div class=\"input-group mb-3\">\r\n              <div class=\"input-group-prepend\">\r\n                <span class=\"input-group-text\"><i class=\"feather icon-mail\"></i></span>\r\n              </div>\r\n              <input type=\"email\" class=\"form-control\"  formControlName=\"email\" placeholder=\"Email address\">\r\n            </div>\r\n            <div class=\"input-group mb-4\">\r\n              <div class=\"input-group-prepend\">\r\n                <span class=\"input-group-text\"><i class=\"feather icon-lock\"></i></span>\r\n              </div>\r\n              <input type=\"password\" class=\"form-control\"  formControlName=\"password\" placeholder=\"Password\">\r\n            </div>\r\n            <button class=\"btn btn-block btn-primary mb-4\">Signin</button>\r\n            <p class=\"mb-2 text-muted\">Forgot password? <a [routerLink]=\"['/auth/reset-password']\" class=\"f-w-400\">Reset</a></p>\r\n        </form>\r\n        </div>\r\n      </div>\r\n    </div>\r\n  </div>\r\n</div>\r\n</div>\r\n"
