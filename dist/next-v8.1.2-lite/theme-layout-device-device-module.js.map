module.exports = "<agm-map\n\n  [latitude]=\"lat\"\n  [longitude]=\"lng\"\n  [zoom]=\"zoom\"\n  (mapReady)=\"onMapReady($event)\"\n  style=\"height: 100vh; width: 100%;\">\n\n\n\n  <!-- Path -->\n  <!-- <agm-polyline\n    [strokeColor]=\"'green'\"\n    [strokeWeight]=\"3\">\n\n    <agm-polyline-point\n      *ngFor=\"let point of path\"\n      [latitude]=\"point.lat\"\n      [longitude]=\"point.lng\">\n    </agm-polyline-point>\n\n  </agm-polyline> -->\n\n  <!-- Green markers for every lat/lng -->\n  <agm-marker\n    *ngFor=\"let point of path; let i = index\"\n    [latitude]=\"point.lat\"\n    [longitude]=\"point.lng\"\n    [iconUrl]=\"'http://maps.google.com/mapfiles/ms/icons/FORWARD_CLOSED_ARROW.png'\">\n  </agm-marker>\n\n</agm-map>\n"
