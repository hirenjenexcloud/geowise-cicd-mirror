name: GeoWise CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Skip tests
        run: echo "No tests yet"

      - name: Build Angular project
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t hpjenex1/geotracker-app:latest .

      - name: Push Docker image
        run: docker push hpjenex1/geotracker-app:latest

      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo docker pull hpjenex1/geotracker-app:latest

            sudo docker stop geotracker-app || true
            sudo docker rm geotracker-app || true

            sudo docker run -d \
              --name geotracker-app \
              --restart unless-stopped \
              -p 4000:4000 \
              -p 1883:1883 \
              -e NODE_ENV=production \
              -e MONGO_URI=mongodb://172.17.0.1:27017/geotracker \
              -v /opt/geotracker/uploads:/usr/src/app/Server/src/uploads \
              -v /opt/geotracker/logs:/usr/src/app/Server/src/logs \
              hpjenex1/geotracker-app:latest